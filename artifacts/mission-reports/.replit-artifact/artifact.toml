kind = "web"
previewPath = "/"
title = "Missionary Reports"
version = "1.0.0"
id = "artifacts/mission-reports"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24327

[services.development]
run = "pnpm --filter @workspace/mission-reports run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mission-reports", "run", "build" ]
publicDir = "artifacts/mission-reports/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24327"
BASE_PATH = "/"
